name: desktop-build

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            tauri_args: --bundles app
          - os: windows-latest
            tauri_args: --bundles nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend type checks
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build desktop application
        run: npm run tauri:build -- ${{ matrix.tauri_args }}

      - name: Write build metadata
        shell: bash
        run: |
          mkdir -p artifacts/build-metadata
          cat <<EOF > artifacts/build-metadata/${{ matrix.os }}-${{ github.run_id }}.json
          {
            "os": "${{ matrix.os }}",
            "runId": "${{ github.run_id }}",
            "status": "success",
            "completedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-usage-${{ matrix.os }}
          path: |
            target/release/bundle/**
            dist/**
            artifacts/build-metadata/*.json
